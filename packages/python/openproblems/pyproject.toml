[build-system]
requires = ["setuptools>=64", "setuptools_scm[toml]>=8"]
build-backend = "setuptools.build_meta"

[project]
name = "openproblems"
dynamic = ["version"]
description = "OpenProblems core Python helper functions."
authors = [
  { name = "Robrecht Cannoodt", email = "rcannood@gmail.com" }
]
license = { text = "MIT" }
readme = "README.md"
requires-python = ">= 3.9"
keywords = ["openproblems", "benchmarking", "bioinformatics", "viash"]
classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Science/Research",
  "License :: OSI Approved :: MIT License",
  "Operating System :: OS Independent",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.9",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Topic :: Scientific/Engineering :: Bio-Informatics",
]
dependencies = [
  'PyYAML',
  'networkx',
]

[project.optional-dependencies]
test = [
  "pytest>=8.0"
]

[project.urls]
Homepage = "https://openproblems.bio/documentation"
Repository = "https://github.com/openproblems-bio/core"
"Bug Tracker" = "https://github.com/openproblems-bio/core/issues"
Changelog = "https://github.com/openproblems-bio/core/blob/main/packages/python/openproblems/CHANGELOG.md"

[tool.setuptools.packages.find]
where = ["src"]
include = ["openproblems*"]
exclude = ["tests*"]

[tool.setuptools_scm]
root = "../../.."
