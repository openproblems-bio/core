name: base_pytorch_nvidia
description: An nvcr.io pytorch with anndata preinstalled.
test_resources:
  - type: python_script
    path: test_pytorch.py
  - type: python_script
    path: ../python/test_anndata.py
engines:
  - type: docker
    image: nvcr.io/nvidia/pytorch:26.02-py3
    setup:
      - type: apt
        packages:
          - procps
          - git
      - type: python
        packages:
          - anndata~=0.12.0
          - scanpy~=1.12
          - requests
          - jsonschema
        github:
          - openproblems-bio/core#subdirectory=packages/python/openproblems
