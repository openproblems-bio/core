name: base_tensorflow_nvidia
description: An nvcr.io tensorflow with anndata preinstalled.
test_resources:
  - type: python_script
    path: test_tensorflow.py
  - type: python_script
    path: ../python/test_anndata.py
engines:
  - type: docker
    image: nvcr.io/nvidia/tensorflow:25.02-tf2-py3
    setup:
      - type: apt
        packages:
          - procps
          - git
      - type: python
        packages:
          - numpy~=1.26.0
          - anndata~=0.12.0
          - scanpy~=1.10.0
          - pyyaml
          - requests
          - jsonschema
        github:
          - openproblems-bio/core#subdirectory=packages/python/openproblems
